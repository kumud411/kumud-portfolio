<section class="certification-section">

  <div class="container">

    <h2 class="title">Certifications</h2>

    <div class="cert-grid">

      <div class="cert-card" *ngFor="let cert of certifications">

        <div class="icon-box">
          <i class="bi bi-award"></i>
        </div>

        <div class="cert-info">
          <h3>{{cert.title}}</h3>
          <p>{{cert.provider}}</p>
        </div>

      </div>

    </div>

  </div>

</section>
