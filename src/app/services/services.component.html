<section class="services-section">

  <div class="container">

    <h2 class="title">
      My <span>Services</span>
    </h2>
              <div class="line"></div>


    <div class="services-grid">

      <div class="service-card" *ngFor="let service of services">

        <div class="icon">
          <i [class]="service.icon"></i>
        </div>

        <h3>{{service.title}}</h3>

        <p>{{service.description}}</p>

      </div>

    </div>

  </div>

</section>
