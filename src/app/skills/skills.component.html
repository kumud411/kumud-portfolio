<section class="skills-section">

  <h2 class="title">
    My <span>Skills</span>
  </h2>
          <div class="line"></div>

  <div class="skills-container">

    <div class="skill-card" *ngFor="let skill of skills">

      <div class="icon">
        {{skill.icon}}
      </div>

      <h3>{{skill.name}}</h3>

      <div class="progress-bar">
        <div class="progress" [style.width.%]="skill.percent"></div>
      </div>

      <p>{{skill.percent}}%</p>

    </div>

  </div>

</section>
